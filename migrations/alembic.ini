# Alembic configuration for IDM
# Run from apps/api/: alembic -c ../../migrations/alembic.ini upgrade head
# 或经 Makefile: make db-upgrade

[alembic]
script_location = .
prepend_sys_path = ../apps/api/src
# 启用 uv workspace 后, prepend_sys_path 让 env.py 找得到 idm_api / idm_kg
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
timezone = UTC
truncate_slug_length = 40
revision_environment = false
sourceless = false

# === DSN: 运行时由 env.py 从 settings 注入 ===
sqlalchemy.url = postgresql+psycopg://idm:idm@localhost:5432/idm

[post_write_hooks]
# format 迁移文件 (可选)
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
