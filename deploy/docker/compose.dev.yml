# IDM — Development & Local Tooling Compose
# 用于本地起 PG (含 AGE + pgvector) / Redis / Langfuse
# 生产用 CloudSQL + GCE ClickHouse + GKE

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: idm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: idm
      POSTGRES_PASSWORD: idm
      POSTGRES_DB: idm
    ports:
      - "5432:5432"
    volumes:
      - idm_pgdata:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idm"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: idm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - idm_redis:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: idm-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: shop
      CLICKHOUSE_USER: idm_ro
      CLICKHOUSE_PASSWORD: idm_ro
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - idm_chdata:/var/lib/clickhouse

  # Langfuse (LLM 观测, 简化版)
  langfuse-web:
    image: langfuse/langfuse:2
    container_name: idm-langfuse
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: dev-secret-change-me
      DATABASE_URL: postgresql://idm:idm@postgres:5432/idm
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  idm_pgdata:
  idm_redis:
  idm_chdata:
