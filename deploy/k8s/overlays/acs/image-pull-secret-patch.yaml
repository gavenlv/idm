# === 给 Pod 注入 ACR 拉取凭证 ===
# 用法:
#   1) kubectl create secret docker-registry acr-registry \
#        --docker-server=registry.cn-hangzhou.aliyuncs.com \
#        --docker-username=... --docker-password=... -n idm
#   2) kubectl patch deployment idm-api -n idm \
#        -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"acr-registry"}]}}}}'
#      (或用本 patch 自动)
# 本 patch 由 kustomize 自动注入

- op: add
  path: /spec/template/spec/imagePullSecrets
  value:
    - name: acr-registry
