name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.5"

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - name: Install uv
        run: pip install uv==${{ env.UV_VERSION }}
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
      - run: uv sync --frozen --all-extras --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy apps packages

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: idm
          POSTGRES_PASSWORD: idm
          POSTGRES_DB: idm_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U idm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://idm:idm@localhost:5432/idm_test
      DATABASE_URL_SYNC: postgresql+psycopg://idm:idm@localhost:5432/idm_test
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ matrix.python-version }} }
      - run: pip install uv==${{ env.UV_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
      - run: uv sync --frozen --all-extras --dev
      - name: Run migrations
        run: cd apps/api && uv run alembic -c ../../migrations/alembic.ini upgrade head
      - name: Run tests
        run: uv run pytest -v --cov=apps --cov=packages --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build idm-api image (smoke)
        run: |
          docker build -t idm-api:ci-${{ github.sha }} -f apps/api/Dockerfile .
      - name: Build idm-web image (smoke)
        run: |
          docker build -t idm-web:ci-${{ github.sha }} -f apps/web/Dockerfile .
