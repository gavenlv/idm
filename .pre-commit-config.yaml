repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.9]
        files: ^(apps|packages)/.+\.py$
        exclude: ^migrations/versions/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^use_cases/.+\.yml$
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: forbid-antd
        name: forbid antd / material UI in frontend
        entry: bash -c '! grep -rEn "antd|@mui|@chakra-ui" apps/web/src 2>/dev/null'
        language: system
        pass_filenames: false
        types: [ts, tsx, js, jsx, json]
      - id: forbid-llm-direct-mcp
        name: forbid direct mcp tool calls in agent code
        entry: bash -c '! grep -rEn "await mcp_client\.|mcp_client.call_tool" apps/agent 2>/dev/null'
        language: system
        pass_filenames: false
        types: [python]
